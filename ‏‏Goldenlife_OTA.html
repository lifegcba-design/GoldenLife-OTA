<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Golden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fbfd;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #container {
            background-color: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: fit-content;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            font-size: 26px;
            color: #007bff;
            margin-bottom: 25px;
        }

        label {
            font-weight: 600;
            margin-top: 15px;
            display: block;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        button:hover {
            background-color: #0056b3;
        }

        #disconnectButton {
            background-color: #dc3545;
        }

        #disconnectButton:hover {
            background-color: #c82333;

        }

        #errorMessage {
            color: #dc3545;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }

        #controlPanel {
            display: none;
        }

        #totalVibrations {
            font-size: 34px;
            color: #007bff;
            font-weight: bold;
            margin-top: 20px;
        }

        .status-container {

            margin-top: 30px;
            background-color: #e9f7fd;
            padding: 20px;
            border-radius: 15px;
        }

        .status-container h3 {
            margin-bottom: 0;
            font-size: 18px;
            color: #007bff;
        }

        .status-container span {
            font-size: 32px;
        }

        @media (max-width: 600px) {
            #container {
                padding: 20px;
                width: 90%;
            }


            h1 {
                font-size: 22px;
            }

            input[type="number"], button {
                width: 100%;
                font-size: 14px;
            }

            .status-container {
                padding: 15px;
            }

            .status-container h3 {
                font-size: 16px;
            }

            .status-container span {
                font-size: 28px;
            }

        }
        #advancedOptions label {
            margin-top: 10px;
            font-weight: 600;
            display: block;
            color: #444;
        }

        #advancedOptions input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        /* NEW CSS for the new h3 in advancedOptions */

        #advancedOptions h3 {
            font-size: 18px; /* Match other H3s */
            color: #007bff; /* Match other H3s */
            margin-top: 15px; /* Add some space above */
            margin-bottom: 10px; /* Add some space below */
        }
        #advancedOptions h3 span {
            font-size: 22px; /* Make the number a bit larger */
            font-weight: bold;
            color: #333; /* Default text color or specific, depending on preference */
        }

        /* Styles for OTA section */
        .ota-section {
            border-top: 1px solid #eee;
            margin-top: 30px;
            padding-top: 20px;
            text-align: left;
        }

        .ota-section h2 {
            font-size: 20px;
            color: #007bff;
            margin-bottom: 20px;
            text-align: center;
        }

        .ota-section input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f0f8ff;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 25px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #28a745;
            text-align: center;
            color: white;
            line-height: 25px;
            border-radius: 10px;
            transition: width 0.3s ease-in-out;
        }

        #otaStatusMessage {
            margin-top: 10px;
            font-size: 14px;
            color: #333;
            text-align: center;
            min-height: 20px; /* To prevent layout shift */
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>BLE Control Panel</h1>

        <div id="errorMessage">Failed to connect to BLE device. Please try again.</div>

        <button id="connectButton" onclick="connectBLE()">
            <i class="fas fa-plug"></i> Connect to ESP32 BLE
        </button>
        <button id="disconnectButton" onclick="disconnectBLE()" style="display:none;">
            <i class="fas fa-times-circle"></i> Disconnect BLE
        </button>
        <div id="statusMessage" style="color: green; margin-top: 10px;"></div>
        <div id="controlPanel">
            <h3>
               <i id="batteryIcon" class="fas fa-battery-empty" style="color: #666; font-size: 1.2em; margin-right: 8px;"></i>
                מצב סוללה: <span id="batteryPercentageDisplay">--</span>%
            </h3>
            <h3>תרחישים שנותרו: <span id="remainingScenariosDisplay">--</span></h3>

            <label for="vibratePower">Vibrate Power:</label>
            <input type="number" id="vibratePower" min="160" max="255" placeholder="Enter Vibrate Power" onchange="updateBLEValue('vibratePower')">

            <label for="pulseInterval">Pulse Interval (ms):</label>
            <input type="number" id="pulseInterval" min="100" max="5000" placeholder="Enter Pulse Interval" onchange="updateBLEValue('pulseInterval')">


            <label for="pulseNumber">Pulse Number:</label>
            <input type="number" id="pulseNumber" min="1" max="2000" placeholder="Enter Pulse Number" onchange="updateBLEValue('pulseNumber')">

            <label for="vibrationDuration">Vibration Duration (ms):</label>
            <input type="number" id="vibrationDuration" min="100" max="2000" placeholder="Enter Vibration Duration" onchange="updateBLEValue('vibrationDuration')">
            <button id="startButton" onclick="startScenario()">
                <i class="fas fa-play-circle"></i> Start Scenario
            </button>
            <button id="stopButton" onclick="stopScenario()">
                <i class="fas fa-stop-circle"></i> Stop Scenario
            </button>
            <button onclick="toggleAdvancedOptions()"><i class="fas fa-cogs"></i> אפשרויות מתקדמות</button>
            
            <div id="advancedOptions" style="display: none; margin-top: 20px;">
                <label for="postDelay">זמן השהייה בין תרחישים (בדקות)</label>
                <input id="postDelay" type="number" min="0" max="65535" value="35" onchange="updateBLEValue('postDelay')" />
                
                <small style="display:block; margin-bottom: 10px; color: gray;">מינימום 35 דקות</small>
                <label for="repeatCount">מספר חזרות:</label>
                <input id="repeatCount" type="number" min="1" max="255" value="1" onchange="updateBLEValue('repeatCount')" />

                <hr style="margin-top: 20px; margin-bottom: 20px; border-top: 1px solid #eee;">
                <div class="ota-section">
                    <h2>עדכון קושחה (OTA)</h2>
                    <input type="file" id="firmwareFile" accept=".bin">
                    <button id="startOtaButton" onclick="startOtaUpdate()" disabled>
                        <i class="fas fa-cloud-upload-alt"></i> התחל עדכון קושחה
                    </button>
                    <!-- ADDED id="otaProgressBarContainer" HERE -->
                    <div class="progress-bar-container" id="otaProgressBarContainer">
                        <div class="progress-bar" id="otaProgressBar">0%</div>
                    </div>
                    <div id="otaStatusMessage"></div>
                </div>
            </div> <!-- Correctly closing advancedOptions -->
            
            <h3>Remaining Vibrations: <span id="totalVibrations">0</span></h3>    
        </div> <!-- Correctly closing controlPanel -->
    </div>
</body>
<script>
    let device, server, service, charStart, charStop, charVibratePower, charPulseInterval, charPulseNumber,
        charVibrationDuration, charVibrationStatus;

    // OTA related characteristics
    let otaService, otaControlChar, otaDataChar, otaStatusChar;
    // --- UPDATED UUIDs TO MATCH ESP32 CODE (AND NOW LOWERCASE FOR WEB BLUETOOTH) ---
    const otaServiceUuid = "501a0001-08ee-4dee-ae83-3a19c0e28b02";
    const otaControlCharUuid = "501a0003-08ee-4dee-ae83-3a19c0e28b02";
    const otaDataCharUuid = "501a0002-08ee-4dee-ae83-3a19c0e28b02";
    const otaStatusCharUuid = "501a0004-08ee-4dee-ae83-3a19c0e28b02";

    // --- Main Service and Characteristics UUIDs (also converted to lowercase) ---
    const mainServiceUuid = "069f372b-274b-4198-a099-74f2791734a5";
    const charUuidVibratePower = "84a054be-6a59-402c-9f49-cf3a5a0c230b";
    const charUuidPulseInterval = "53843d2f-2a09-4614-8776-fc8a68fee4b9";
    const charUuidPulseNumber = "8c29fc39-27ae-4e90-a7de-eb3eb4f820bf";
    const charUuidVibrationDuration = "7737e412-351e-4245-9e79-b2a5673a5abf";
    const charUuidStartStop = "66ccf7cf-6a9e-4eda-b868-515dd5b9eb8b";
    const charUuidVibrationStatus = "12cfcb54-2b8a-4da4-a737-f040b6f79fc7";


    const OTA_COMMAND_START = 0x01;
    const OTA_COMMAND_END = 0x02;
    const OTA_COMMAND_ABORT = 0x03; // Note: ESP32 code uses 0x03 for CANCEL OTA
    const MAX_CHUNK_SIZE = 500; // Max bytes per BLE write operation (adjust based on ESP32 MTU)

    let connectionInterval;

    // --- Battery Voltage Constants (Adjust these based on your specific battery) ---
    const BATTERY_MAX_VOLTAGE = 4.2; // Full charge voltage for a 3.7V LiPo
    const BATTERY_MIN_VOLTAGE = 3.0; // Empty voltage (cutoff) for a 3.7V LiPo

    // This function is still useful for general checks, but ondisconnected is more immediate.
    function checkBLEConnection() {
        if (!device || !device.gatt.connected) {
            console.log("BLE disconnected, trying to reconnect (from interval check)...");
            // Call the disconnection handling directly
            handleBleDisconnected();
        }
    }

    // New function to handle BLE disconnection events
    function handleBleDisconnected(event) {
        console.log('BLE device disconnected!', event ? event.target.name : '');
        document.getElementById('statusMessage').textContent = "Connection Lost. Please reconnect.";
        document.getElementById('errorMessage').textContent = "חיבור נותק. אנא לחץ על 'התחבר ל-ESP32 BLE' כדי לבחור ולהתחבר מחדש."; // הודעה מפורטת יותר
        document.getElementById('errorMessage').style.display = 'block';

        // Hide control panel, show connect button
        document.getElementById('controlPanel').style.display = 'none';
        
        document.getElementById('connectButton').style.display = 'block'; // הצג את כפתור ההתחברות מחדש
        document.getElementById('disconnectButton').style.display = 'none';

        // Clear the periodic connection check interval if it's running
        clearInterval(connectionInterval);
        connectionInterval = null; // Reset to null after clearing

        // Reset device and server objects to null to ensure a fresh connection
        device = null;
        server = null;
        service = null;
        charStart = null;
        charStop = null;
        charVibratePower = null;
        charPulseInterval = null;
        charPulseNumber = null;
        charVibrationDuration = null;
        charVibrationStatus = null;

        // Reset OTA related characteristics as well
        otaService = null;
        otaControlChar = null;
        otaDataChar = null;
        otaStatusChar = null;

        document.getElementById('startOtaButton').disabled = true; // Disable OTA button on disconnect
        document.getElementById('otaProgressBarContainer').style.display = 'none'; // Hide container
        document.getElementById('otaProgressBar').style.width = '0%';
        document.getElementById('otaProgressBar').textContent = '0%';
        document.getElementById('otaStatusMessage').textContent = '';

        // Reset battery display on disconnect
        document.getElementById('batteryPercentageDisplay').textContent = '--';
        document.getElementById('batteryIcon').className = 'fas fa-battery-empty';
        document.getElementById('batteryIcon').style.color = '#666';
    }

    // פונקציה להתחבר ל-BLE
    async function connectBLE() {
        try {
            // Reset UI state before attempting connection
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('statusMessage').textContent = "מתחבר...";

            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true, // Consider using filters for specific devices
                optionalServices: [
                    mainServiceUuid, // Existing custom service (lowercase)
                    otaServiceUuid // New OTA service UUID (lowercase)
                ]
            });

            // Add the disconnection event listener immediately after getting the device
            device.addEventListener('gattserverdisconnected', handleBleDisconnected);

            server = await device.gatt.connect();

            // Get main service and characteristics
            service = await server.getPrimaryService(mainServiceUuid);

            // קבלת מאפיינים (now using lowercase UUID constants)
            await getCharacteristic(service, charUuidVibratePower, 'Vibrate Power', (c) => charVibratePower = c);
            await getCharacteristic(service, charUuidPulseInterval, 'Pulse Interval', (c) => charPulseInterval = c);
            await getCharacteristic(service, charUuidPulseNumber, 'Pulse Number', (c) => charPulseNumber = c);
            await getCharacteristic(service, charUuidVibrationDuration, 'Vibration Duration', (c) => charVibrationDuration = c);
            await getCharacteristic(service, charUuidStartStop, 'Start/Stop', (c) => { charStart = c; charStop = c });
            await getCharacteristic(service, charUuidVibrationStatus, 'Vibration Status', (c) => charVibrationStatus = c);

            // Get OTA Service and Characteristics (now using lowercase UUID constants)
            otaService = await server.getPrimaryService(otaServiceUuid);
            await getCharacteristic(otaService, otaControlCharUuid, 'OTA Control', (c) => otaControlChar = c);
            await getCharacteristic(otaService, otaDataCharUuid, 'OTA Data', (c) => otaDataChar = c);
            await getCharacteristic(otaService, otaStatusCharUuid, 'OTA Status', (c) => otaStatusChar = c);

            // עכשיו שים כאן את הטעינה של פרמטרים
            await loadScenarioParams();
            await loadSettingsFromBLE(); // This was missing, good to have it here
            await startNotifications();
            
            // Show control panel and update button visibility
            document.getElementById('controlPanel').style.display = 'block';
            document.getElementById('connectButton').style.display = 'none';
            document.getElementById('disconnectButton').style.display = 'block';
            
            document.getElementById('statusMessage').textContent = "מחובר למכשיר: " + (device.name || 'Unknown Device');
            document.getElementById('errorMessage').style.display = 'none';

            // Start the periodic connection check if it's not already running
            if (!connectionInterval) {
                connectionInterval = setInterval(checkBLEConnection, 30000);
            }

            // Enable OTA button if file is selected and connection is successful
            const firmwareFile = document.getElementById('firmwareFile');
            if (firmwareFile.files.length > 0) {
                document.getElementById('startOtaButton').disabled = false;
            }

        } catch (error) {
            console.error('BLE connection failed:', error);
            // Check if the error is due to user cancellation (e.g., closing the device picker)
            if (error.name === 'NotFoundError') {
                document.getElementById('errorMessage').textContent = "בחירת המכשיר בוטלה. אנא נסה שוב.";
            } else {
                document.getElementById('errorMessage').textContent = `חיבור BLE נכשל: ${error.message}`;
            }
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('statusMessage').textContent = "התחברות נכשלה.";
            
            // Ensure UI is reset to disconnected state on failure
            document.getElementById('controlPanel').style.display = 'none';
            document.getElementById('connectButton').style.display = 'block';
            document.getElementById('disconnectButton').style.display = 'none';
            clearInterval(connectionInterval);
            connectionInterval = null;
            document.getElementById('startOtaButton').disabled = true; // Disable OTA button on connect failure
        }
    }


    function updateVibrationStatus(remainingVibrations) {
        document.getElementById('totalVibrations').textContent = remainingVibrations;
    }

    async function updateBLEValue(field) {
        try {
            if (!device || !device.gatt.connected) {
                console.warn('Cannot update BLE value: Device not connected.');
                handleBleDisconnected(); // Show disconnection message
                return;
            }

            let value;
            switch (field) {
                case 'vibratePower':
                    value = parseInt(document.getElementById('vibratePower').value, 10);
                    if (charVibratePower) {
                        const buffer = new ArrayBuffer(1);
                        new DataView(buffer).setUint8(0, value);
                        await charVibratePower.writeValue(buffer);
                    }
                    break;
                case 'pulseInterval':
                    value = parseInt(document.getElementById('pulseInterval').value, 10);
                    if (charPulseInterval) {
                        const buffer = new ArrayBuffer(2);
                        new DataView(buffer).setUint16(0, value, true);
                        await charPulseInterval.writeValue(buffer);
                    }
                    break;
                case 'pulseNumber':
                    value = parseInt(document.getElementById('pulseNumber').value, 10);
                    if (charPulseNumber) {
                        const buffer = new ArrayBuffer(2);
                        new DataView(buffer).setUint16(0, value, true);
                        await charPulseNumber.writeValue(buffer);
                    }
                    break;
                case 'vibrationDuration':
                    value = parseInt(document.getElementById('vibrationDuration').value, 10);
                    if (charVibrationDuration) {
                        const buffer = new ArrayBuffer(2);
                        new DataView(buffer).setUint16(0, value, true);
                        await charVibrationDuration.writeValue(buffer);
                    }
                    break;
                case 'postDelay':
                    value = parseInt(document.getElementById('postDelay').value, 10);
                    let currentRepeatCountForDelay = parseInt(document.getElementById('repeatCount').value, 10);
                    if (charStart) {
                        const buffer = new ArrayBuffer(7);
                        const view = new DataView(buffer);
                        view.setUint8(0, 0); // Command: 0 (Idle/Update config)
                        view.setUint16(1, value, true); // New Post Delay
                        view.setUint8(3, currentRepeatCountForDelay); // Current Repeat Count
                        view.setUint16(4, 0, true); // Placeholder for voltage
                        view.setUint8(6, 0); // Placeholder for remaining scenarios
                        await charStart.writeValue(buffer);
                        console.log(`📤 Sent Post Delay update: ${value} minutes, repeat: ${currentRepeatCountForDelay}`);
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    break;
                case 'repeatCount':
                    value = parseInt(document.getElementById('repeatCount').value, 10);
                    let currentPostDelayForRepeat = parseInt(document.getElementById('postDelay').value, 10);
                    if (charStart) {
                        const buffer = new ArrayBuffer(7);
                        const view = new DataView(buffer);
                        view.setUint8(0, 0); // Command: 0 (Idle/Update config)
                        view.setUint16(1, currentPostDelayForRepeat, true); // Current Post Delay
                        view.setUint8(3, value); // New Repeat Count
                        view.setUint16(4, 0, true); // Placeholder for voltage
                        view.setUint8(6, 0); // Placeholder for remaining scenarios
                        await charStart.writeValue(buffer);
                        console.log(`📤 Sent Repeat Count update: ${value}, postDelay: ${currentPostDelayForRepeat}`);
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    break;
            }
        } catch (error) {
            console.error(`Failed to update ${field} on BLE:`, error);
            handleBleDisconnected(); // Also handle disconnection on write errors
        }
    }

    async function loadSettingsFromBLE() {
        try {
            if (!device || !device.gatt.connected) {
                console.warn('Cannot load settings: Device not connected.');
                return;
            }

            const vibratePowerValue = await charVibratePower.readValue();
            const vibratePower = new DataView(vibratePowerValue.buffer).getUint8(0);
            document.getElementById('vibratePower').value = vibratePower;

            const pulseIntervalValue = await charPulseInterval.readValue();
            const pulseInterval = new DataView(pulseIntervalValue.buffer).getUint16(0, true);
            document.getElementById('pulseInterval').value = pulseInterval;

            const pulseNumberValue = await charPulseNumber.readValue();
            const pulseNumber = new DataView(pulseNumberValue.buffer).getUint16(0, true);
            
            document.getElementById('pulseNumber').value = pulseNumber;

            const vibrationDurationValue = await charVibrationDuration.readValue();
            const vibrationDuration = new DataView(vibrationDurationValue.buffer).getUint16(0, true);
            document.getElementById('vibrationDuration').value = vibrationDuration;

        } catch (error) {
            console.error("Failed to load settings from BLE: ", error);
            handleBleDisconnected(); // Handle disconnection on read errors
        }
    }
    
    function parseStartStopData(dataView) {
        const command = dataView.getUint8(0);
        const delay = dataView.getUint16(1, true); // true = little endian
        const repeat = dataView.getUint8(3);
        const voltageRaw = dataView.getUint16(4, true); // זהו המתח מוכפל ב-100
        const remainingScenarios = dataView.getUint8(6); // בייט חדש (אינדקס 6)

        const voltageV = voltageRaw / 100; // חזרה למתח ב-V

        return { command, delay, repeat, voltageV, remainingScenarios };
    }

    // Function to calculate battery percentage and update icon
    function updateBatteryDisplay(voltageV) {
        const batteryPercentageDisplay = document.getElementById('batteryPercentageDisplay');
        const batteryIcon = document.getElementById('batteryIcon');

        let percentage = 0;
        if (voltageV >= BATTERY_MAX_VOLTAGE) {
            percentage = 100;
        } else if (voltageV <= BATTERY_MIN_VOLTAGE) {
            percentage = 0;
        } else {
            percentage = ((voltageV - BATTERY_MIN_VOLTAGE) / (BATTERY_MAX_VOLTAGE - BATTERY_MIN_VOLTAGE)) * 100;
            percentage = Math.round(percentage); // Round to nearest whole number
        }

        batteryPercentageDisplay.textContent = percentage;

        // Update battery icon based on percentage
        if (percentage > 90) {
            batteryIcon.className = 'fas fa-battery-full';
            batteryIcon.style.color = '#28a745'; // Green
        } else if (percentage > 60) {
            batteryIcon.className = 'fas fa-battery-three-quarters';
            batteryIcon.style.color = '#4CAF50'; // Darker Green
        } else if (percentage > 30) {
            batteryIcon.className = 'fas fa-battery-half';
            batteryIcon.style.color = '#ffc107'; // Yellow
        } else if (percentage > 10) {
            batteryIcon.className = 'fas fa-battery-quarter';
            batteryIcon.style.color = '#fd7e14'; // Orange
        } else {
            batteryIcon.className = 'fas fa-battery-empty';
            batteryIcon.style.color = '#dc3545'; // Red
        }
    }

    async function loadScenarioParams() {
        try {
            if (!device || !device.gatt.connected) {
                console.warn('Cannot load scenario params: Device not connected.');
                return;
            }

            const value = await charStart.readValue();
            const view = new DataView(value.buffer);
            const len = view.byteLength;

            console.log('Scenario params raw data length:', len);
            console.log('Raw data:', [...new Uint8Array(value.buffer)]);

            if (len < 7) { // וודא שאנחנו מצפים ל-7 בייטים לפחות
                console.warn('Received data length less than expected (7 bytes) for Start/Stop characteristic.');
                return;
            }

            // השתמש ב-parseStartStopData לפענוח
            const { command, delay, repeat, voltageV, remainingScenarios } = parseStartStopData(view);

            const postDelayElem = document.getElementById('postDelay');
            if (postDelayElem) {
                postDelayElem.value = delay >= 4 ? delay : 4; // אם הערך שגוי, השתמש במינימום
            }

            const repeatCountElem = document.getElementById('repeatCount');
            if (repeatCountElem) {
                repeatCountElem.value = repeat > 0 ? repeat : 1; // אם הערך שגוי, השתמש במינימום
            }

            // Update battery display using the new function
            updateBatteryDisplay(voltageV);

            // עדכון תצוגת תרחישים שנותרו
            const remainingScenariosDisplay = document.getElementById('remainingScenariosDisplay');
            if (remainingScenariosDisplay) {
                if (remainingScenarios === 0 && (command === 0 || command === 1)) {
                    remainingScenariosDisplay.textContent = "הסתיים (לחץ התחל מחדש)";
                } else {
                    remainingScenariosDisplay.textContent = remainingScenarios;
                }
            }

            console.log("✅ Loaded scenario parameters:", { command, delay, repeat, voltageV, remainingScenarios });

        } catch (error) {
            console.error("❌ Failed to load scenario parameters:", error);
            handleBleDisconnected(); // Handle disconnection on read errors
        }

    }
    async function getCharacteristic(service, uuid, name, callback) {
        try {
            const characteristic = await service.getCharacteristic(uuid);
            console.log(`${name} characteristic retrieved.`);
            callback(characteristic);
        } catch (error) {
            console.warn(`${name} characteristic not found:`, error);
            throw error;
        }
    }
    async function startScenario() {
        try {
            if (!device || !device.gatt.connected) {
                console.warn('Cannot start scenario: Device not connected. Please connect first.');
                return;
            }

            let postDelayMinutes = parseInt(document.getElementById('postDelay').value, 10);
            if (isNaN(postDelayMinutes) || postDelayMinutes < 4) {
                console.warn('⛔ Post delay invalid, using minimum 4.');
                postDelayMinutes = 4;
            }

            let repeatCountValue = parseInt(document.getElementById('repeatCount').value, 10);
            if (isNaN(repeatCountValue) || repeatCountValue < 1) {
                console.warn('⛔ Repeat count invalid, using minimum 1.');
                repeatCountValue = 1;
            }

            // We do not read battery voltage from UI for sending, it's received from device
            // The battery voltage is part of the notification from the device, not sent to it.

            if (charStart) {
                const buffer = new ArrayBuffer(7);
                const view = new DataView(buffer);
                view.setUint8(0, 1); // Command: Start
                view.setUint16(1, postDelayMinutes, true); // Delay in minutes (2 bytes, little-endian)
                view.setUint8(3, repeatCountValue); // Number of repeats (1 byte)
                
                // Placeholder for voltage (will be updated by device notification)
                // Sending 0 for voltage as it's a read-only value from the device perspective
                view.setUint16(4, 0, true); 
                view.setUint8(6, repeatCountValue); // Total repeats, used as "remaining" initially

                console.log(`📤 Sending Start: delay=${postDelayMinutes}, repeat=${repeatCountValue}, initial_remaining=${repeatCountValue}`);

                await charStart.writeValue(buffer);
                // הוספת השהיה קצרה של 100ms לאחר שליחת הפקודה
                // זה נותן למכשיר ול-Web BLE API זמן לעבד את הפעולה
                await new Promise(resolve => setTimeout(resolve, 100));
                
                // ה-UI יעודכן באופן אוטומטי כאשר ה-ESP32 ישלח נוטיפיקציה
                // דרך ה-characteristicvaluechanged event listener (handleStartStopUpdate).
            } else {
                console.warn('charStart characteristic is not available. Cannot start scenario.');
            }
        } catch (error) {
            console.error("❌ Failed to send start scenario command:", error);
        }
    }


    async function stopScenario() {
        try {
            // בדוק אם המכשיר מחובר לפני ניסיון לשלוח פקודה
            if (!device || !device.gatt.connected) {
                console.warn('Cannot stop scenario: Device not connected. Please connect first.');
                return;
            }

            // וודא שמאפיין ה-Start/Stop קיים
            if (charStop) {
                const buffer = new ArrayBuffer(1);
                new DataView(buffer).setUint8(0, 0); // Command: 0 (עצור סנריו)

                await charStop.writeValue(buffer); // שלח את הפקודה למכשיר
                console.log("Stop scenario command sent.");
                await new Promise(resolve => setTimeout(resolve, 100)); // Add a small delay for stability
            } else {
                console.warn('charStop characteristic is not available. Cannot stop scenario.');
            }
        } catch (error) {
            console.error("Failed to stop scenario:", error);
            
        }
    }



    async function startNotifications() {
        if (charVibrationStatus) {
            charVibrationStatus.addEventListener('characteristicvaluechanged', handleVibrationUpdate);
            await charVibrationStatus.startNotifications();
            console.log('Started vibration notifications (for internal scenario progress, if used).');
        }

        // Add this: Listen for updates from the Start/Stop characteristic
        if (charStart) {
            charStart.addEventListener('characteristicvaluechanged', handleStartStopUpdate);
            await charStart.startNotifications();
            console.log('Started Start/Stop characteristic notifications.');
        }

        // Add this: Listen for updates from the OTA Status characteristic
        if (otaStatusChar) {
            otaStatusChar.addEventListener('characteristicvaluechanged', handleOtaStatusUpdate);
            await otaStatusChar.startNotifications();
            console.log('Started OTA Status characteristic notifications.');
        }
    }

    // New function to handle Start/Stop characteristic updates
    function handleStartStopUpdate(event) {
        const value = event.target.value; // This is the DataView directly
        const { command, delay, repeat, voltageV, remainingScenarios } = parseStartStopData(value);

        // Update battery display using the new function
        updateBatteryDisplay(voltageV);

        // Update remaining scenarios display
        const remainingScenariosDisplay = document.getElementById('remainingScenariosDisplay');
        if (remainingScenariosDisplay) {
            if (remainingScenarios === 0 && (command === 0 || command === 1)) {
                remainingScenariosDisplay.textContent = "הסתיים (לחץ התחל מחדש)";
            } else {
                remainingScenariosDisplay.textContent = remainingScenarios;
            }
        }

        console.log("BLE Start/Stop Notification:", { command, delay, repeat, voltageV, remainingScenarios });
    }

    function handleVibrationUpdate(event) {
        // קריאת ערך 16 סיביות מהמאפיין
        const value = event.target.value.getUint16(0, true); // true עבור ערכים ב-Little Endian (אם יש צורך)
        
        // הצגת הערך בדף
        document.getElementById('totalVibrations').textContent = value;
    }


    async function disconnectBLE() {
        if (device && device.gatt.connected) {
            device.gatt.disconnect();
            console.log('BLE disconnected');
            // Calling handleBleDisconnected here ensures consistent UI state
            // and prepares for reconnection.
            handleBleDisconnected();    
        } else {
            // If already disconnected, just update UI
            handleBleDisconnected();    
        }
    }

    function toggleAdvancedOptions() {
        const section = document.getElementById('advancedOptions');
        section.style.display = section.style.display === 'none' ? 'block' : 'none';
    }

    // --- OTA Update Functions ---

    // Event listener for file input change
    document.getElementById('firmwareFile').addEventListener('change', (event) => {
        const startOtaButton = document.getElementById('startOtaButton');
        if (event.target.files.length > 0 && device && device.gatt.connected) {
            startOtaButton.disabled = false;
            document.getElementById('otaStatusMessage').textContent = `קובץ נבחר: ${event.target.files[0].name}`;
            document.getElementById('otaStatusMessage').style.color = 'black'; // Reset color
        } else {
            startOtaButton.disabled = true;
            document.getElementById('otaStatusMessage').textContent = 'בחר קובץ קושחה (.bin) והתחבר למכשיר.';
            document.getElementById('otaStatusMessage').style.color = 'gray'; // Default informative color
        }
    });

    async function startOtaUpdate() {
        const firmwareFile = document.getElementById('firmwareFile').files[0];
        const otaProgressBar = document.getElementById('otaProgressBar');
        const otaProgressBarContainer = document.getElementById('otaProgressBarContainer'); // Get the element
        const otaStatusMessage = document.getElementById('otaStatusMessage');
        const startOtaButton = document.getElementById('startOtaButton');

        if (!firmwareFile) {
            otaStatusMessage.textContent = 'אנא בחר קובץ קושחה (.bin) תחילה.';
            otaStatusMessage.style.color = 'red';
            return;
        }

        if (!device || !device.gatt.connected || !otaControlChar || !otaDataChar || !otaStatusChar) {
            otaStatusMessage.textContent = 'המכשיר אינו מחובר או ששירותי OTA אינם זמינים.';
            otaStatusMessage.style.color = 'red';
            handleBleDisconnected(); // Trigger UI reset and prompt for reconnect
            return;
        }

        startOtaButton.disabled = true;
        otaProgressBarContainer.style.display = 'block'; // Now this should work
        otaProgressBar.style.width = '0%';
        otaProgressBar.textContent = '0%';
        otaStatusMessage.textContent = 'מתחיל עדכון קושחה...';
        otaStatusMessage.style.color = 'blue';

        try {
            // Read firmware file as ArrayBuffer
            const reader = new FileReader();
            reader.readAsArrayBuffer(firmwareFile);

            await new Promise((resolve, reject) => {
                reader.onload = resolve;
                reader.onerror = reject;
            });

            const firmwareData = new Uint8Array(reader.result);
            const firmwareSize = firmwareData.length;
            console.log(`Firmware size: ${firmwareSize} bytes`);

            // 1. Send START_OTA command (with firmware size)
            const startCommand = new ArrayBuffer(5); // Command (1 byte) + Size (4 bytes)
            const startView = new DataView(startCommand);
            startView.setUint8(0, OTA_COMMAND_START);
            startView.setUint32(1, firmwareSize, true); // Little-endian for size
            await otaControlChar.writeValue(startCommand);
            console.log('Sent START_OTA command with size:', firmwareSize);
            otaStatusMessage.textContent = 'נשלחה פקודת התחלה. מתחיל העברת נתונים...';

            // Give ESP32 a moment to prepare
            await new Promise(resolve => setTimeout(resolve, 500)); 

            // 2. Send firmware data in chunks
            let bytesSent = 0;
            // Removed totalChunks calculation as it's not strictly necessary for loop control
            console.log(`Starting data transfer...`);

            for (let i = 0; i < firmwareSize; i += MAX_CHUNK_SIZE) {
                const chunk = firmwareData.slice(i, i + MAX_CHUNK_SIZE);
                await sendChunk(chunk);
                bytesSent += chunk.length;

                const progress = Math.min(100, Math.floor((bytesSent / firmwareSize) * 100));
                otaProgressBar.style.width = `${progress}%`;
                otaProgressBar.textContent = `${progress}%`;
                otaStatusMessage.textContent = `מעלה קושחה: ${bytesSent}/${firmwareSize} בתים (${progress}%)`;
                
                // Add a small delay between chunks to prevent overwhelming the BLE buffer
                await new Promise(resolve => setTimeout(resolve, 10)); 
            }
            console.log('All firmware data chunks sent.');
            otaStatusMessage.textContent = 'כל הנתונים נשלחו. ממתין לאישור סיום...';

            // 3. Send END_OTA command
            const endCommand = new ArrayBuffer(1);
            new DataView(endCommand).setUint8(0, OTA_COMMAND_END);
            await otaControlChar.writeValue(endCommand);
            console.log('Sent END_OTA command.');
            otaStatusMessage.textContent = 'פקודת סיום נשלחה. המכשיר מתעדכן...';
            otaStatusMessage.style.color = 'orange';

        } catch (error) {
            console.error('OTA update failed:', error);
            otaStatusMessage.textContent = `עדכון OTA נכשל: ${error.message}`;
            otaStatusMessage.style.color = 'red';
            // Send ABORT_OTA command in case of failure
            if (otaControlChar) {
                try {
                    const abortCommand = new ArrayBuffer(1);
                    new DataView(abortCommand).setUint8(0, OTA_COMMAND_ABORT);
                    await otaControlChar.writeValue(abortCommand);
                    console.log('Sent ABORT_OTA command due to error.');
                } catch (abortError) {
                    console.error('Failed to send ABORT_OTA command:', abortError);
                }
            }
            handleBleDisconnected(); // For errors, also reset UI
        } finally {
            startOtaButton.disabled = false; // Re-enable button after attempt
        }
    }

    async function sendChunk(chunk) {
        if (!otaDataChar) {
            throw new Error('OTA Data Characteristic not available.');
        }
        await otaDataChar.writeValueWithoutResponse(chunk); // Use writeValueWithoutResponse for speed
    }

    function handleOtaStatusUpdate(event) {
        const value = event.target.value; // DataView
        // Check if value is long enough (at least 1 byte for status, 5 bytes for status+progress)
        if (value.byteLength < 1) {
            console.warn("Received empty OTA status update.");
            return;
        }

        const statusCode = value.getUint8(0);
        let progress = 0;
        if (value.byteLength >= 5) { // If progress data is present
            progress = value.getUint32(1, true); // Progress is 4 bytes, little-endian
        }
        
        let statusMessageText = '';
        let messageColor = 'blue';
        let isFinalState = false; // Flag to indicate if OTA process finished (success/fail)

        // OTA Status Definitions (matching Arduino enum)
        const OtaStatus = {
            OTA_IDLE: 0,
            OTA_STARTING: 1,
            OTA_IN_PROGRESS: 2,
            OTA_VERIFYING: 3,
            OTA_COMPLETE: 4,
            OTA_FAILED: 5
        };

        switch (statusCode) {
            case OtaStatus.OTA_IDLE: statusMessageText = 'OTA: מוכן'; messageColor = 'gray'; break;
            case OtaStatus.OTA_STARTING: statusMessageText = 'OTA: מתחיל...'; messageColor = 'blue'; break;
            case OtaStatus.OTA_IN_PROGRESS: 
                // Progress is often sent by device, but if not, we can use local progress
                const firmwareFileSize = document.getElementById('firmwareFile').files[0] ? document.getElementById('firmwareFile').files[0].size : 1;
                // Use the 'progress' value sent by the device if available and valid
                let displayProgress = progress; 
                if (firmwareFileSize > 0) { // Calculate percentage if file size is known
                    displayProgress = Math.min(100, Math.floor((progress / firmwareFileSize) * 100));
                }
                document.getElementById('otaProgressBar').style.width = `${displayProgress}%`;
                document.getElementById('otaProgressBar').textContent = `${displayProgress}%`;
                statusMessageText = `OTA: מעלה קושחה... ${displayProgress}%`; 
                messageColor = 'blue';
                break;
            case OtaStatus.OTA_VERIFYING: statusMessageText = 'OTA: מאמת וצורב קושחה...'; messageColor = 'orange'; break;
            case OtaStatus.OTA_COMPLETE: 
                statusMessageText = 'OTA: הסתיים בהצלחה! המכשיר יופעל מחדש.'; messageColor = 'green';
                document.getElementById('otaProgressBar').style.width = '100%';
                document.getElementById('otaProgressBar').textContent = '100%';
                isFinalState = true;
                break;
            case OtaStatus.OTA_FAILED: 
                statusMessageText = 'OTA: נכשל! אנא נסה שוב.'; messageColor = 'red';
                document.getElementById('otaProgressBar').style.width = '0%';
                document.getElementById('otaProgressBar').textContent = 'נכשל';
                isFinalState = true;
                break;
            default: statusMessageText = `OTA: סטטוס לא ידוע (0x${statusCode.toString(16)})`; messageColor = 'gray'; break;
        }

        console.log(`OTA Status Update: ${statusMessageText} (Code: 0x${statusCode.toString(16)}, Raw Progress: ${progress})`);
        document.getElementById('otaStatusMessage').textContent = statusMessageText;
        document.getElementById('otaStatusMessage').style.color = messageColor;

        if (isFinalState) {
            document.getElementById('startOtaButton').disabled = false; // Re-enable button
            if (statusCode === OtaStatus.OTA_COMPLETE) {
                // If successful, prompt for reconnect after a short delay for user to read message
                setTimeout(() => {
                    document.getElementById('otaStatusMessage').textContent = 'העדכון הסתיים בהצלחה. המכשיר יופעל מחדש. אנא התחבר מחדש.';
                    handleBleDisconnected(); // Trigger UI reset and prompt for reconnect
                }, 2000); 
            } else {
                 handleBleDisconnected(); // For errors, also reset UI
            }
        }
    }
</script>
