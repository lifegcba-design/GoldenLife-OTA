<!DOCTYPE html>
<html lang="he"> <!-- Changed lang to he -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Life - לוח בקרה</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fbfd;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top for longer content */
            min-height: 100vh;
            direction: rtl; /* Added RTL direction */
            text-align: right; /* Changed text-align to right */
        }
        #container {
            background-color: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: fit-content;
            max-width: 450px; /* Increased max-width for better layout on larger screens */
            text-align: center; /* Keep container content centered */
            margin-top: 20px; /* Add some top margin */
        }
        h1 {
            font-size: 26px;
            color: #007bff;
            margin-bottom: 25px;
        }

        label {
            font-weight: 600;
            margin-top: 15px;
            display: block;
            color: #555;
            text-align: right; /* Ensure labels are right-aligned */
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        button:hover {
            background-color: #0056b3;
        }

        #disconnectButton {
            background-color: #dc3545;
        }

        #disconnectButton:hover {
            background-color: #c82333;

        }

        #errorMessage {
            color: #dc3545;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }

        #controlPanel {
            display: none;
        }

        #totalVibrations {
            font-size: 34px;
            color: #007bff;
            font-weight: bold;
            margin-top: 20px;
        }

        .status-container {

            margin-top: 30px;
            background-color: #e9f7fd;
            padding: 20px;
            border-radius: 15px;
        }

        .status-container h3 {
            margin-bottom: 0;
            font-size: 18px;
            color: #007bff;
        }

        .status-container span {
            font-size: 32px;
        }

        @media (max-width: 600px) {
            #container {
                padding: 20px;
                width: 90%;
            }


            h1 {
                font-size: 22px;
            }

            input[type="number"], button {
                width: 100%;
                font-size: 14px;
            }

            .status-container {
                padding: 15px;
            }

            .status-container h3 {
                font-size: 16px;
            }

            .status-container span {
                font-size: 28px;
            }

        }
        #advancedOptions label {
            margin-top: 10px;
            font-weight: 600;
            display: block;
            color: #444;
            text-align: right; /* Ensure labels are right-aligned */
        }

        #advancedOptions input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        /* NEW CSS for the new h3 in advancedOptions */

        #advancedOptions h3 {
            font-size: 18px; /* Match other H3s */
            color: #007bff; /* Match other H3s */
            margin-top: 15px; /* Add some space above */
            margin-bottom: 10px; /* Add some space below */
            text-align: right; /* Ensure H3 is right-aligned */
        }
        #advancedOptions h3 span {
            font-size: 22px; /* Make the number a bit larger */
            font-weight: bold;
            color: #333; /* Default text color or specific, depending on preference */
        }

        /* Styles for OTA section */
        .ota-section {
            border-top: 1px solid #eee;
            margin-top: 30px;
            padding-top: 20px;
            text-align: right; /* Changed text-align to right */
        }

        .ota-section h2 {
            font-size: 20px;
            color: #007bff;
            margin-bottom: 20px;
            text-align: center;
        }

        .ota-section input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f0f8ff;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 25px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #28a745;
            text-align: center;
            color: white;
            line-height: 25px;
            border-radius: 10px;
            transition: width 0.3s ease-in-out;
        }

        #otaStatusMessage {
            margin-top: 10px;
            font-size: 14px;
            color: #333;
            text-align: right; /* Changed text-align to right */
            min-height: 20px; /* To prevent layout shift */
        }
        /* New styles for device info section */
        .device-info-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: right;
        }
        .device-info-section p {
            margin-bottom: 8px;
            font-size: 15px;
            color: #444;
        }
        .device-info-section strong {
            color: #222;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>BLE Control Panel</h1>

        <div id="errorMessage">Failed to connect to BLE device. Please try again.</div>

        <button id="connectButton" onclick="connectBLE()">
            <i class="fas fa-plug"></i> התחבר ל-ESP32 BLE
        </button>
        <button id="disconnectButton" onclick="disconnectBLE()" style="display:none;">
            <i class="fas fa-times-circle"></i> נתק BLE
        </button>
        <div id="statusMessage" style="color: green; margin-top: 10px;"></div>
        <div id="controlPanel">
            <h3>
               <i id="batteryIcon" class="fas fa-battery-empty" style="color: #666; font-size: 1.2em; margin-right: 8px;"></i>
                מצב סוללה: <span id="batteryPercentageDisplay">--</span>%
            </h3>
            <h3>תרחישים שנותרו: <span id="remainingScenariosDisplay">--</span></h3>

            <label for="vibratePower">עוצמת רטט:</label>
            <input type="number" id="vibratePower" min="160" max="255" placeholder="הכנס עוצמת רטט" onchange="debouncedUpdateBLEValue('vibratePower')">

            <label for="pulseInterval">מרווח פעימות (אלפיות שנייה):</label>
            <input type="number" id="pulseInterval" min="100" max="5000" placeholder="הכנס מרווח פעימות" onchange="debouncedUpdateBLEValue('pulseInterval')">


            <label for="pulseNumber">מספר פעימות:</label>
            <input type="number" id="pulseNumber" min="1" max="2000" placeholder="הכנס מספר פעימות" onchange="debouncedUpdateBLEValue('pulseNumber')">

            <label for="vibrationDuration">משך רטט (אלפיות שנייה):</label>
            <input type="number" id="vibrationDuration" min="100" max="2000" placeholder="הכנס משך רטט" onchange="debouncedUpdateBLEValue('vibrationDuration')">
            <button id="startButton" onclick="queueBleOperation('startScenario')">
                <i class="fas fa-play-circle"></i> התחל תרחיש
            </button>
            <button id="stopButton" onclick="queueBleOperation('stopScenario')">
                <i class="fas fa-stop-circle"></i> עצור תרחיש
            </button>
            <button onclick="toggleAdvancedOptions()"><i class="fas fa-cogs"></i> אפשרויות מתקדמות</button>
            
            <div id="advancedOptions" style="display: none; margin-top: 20px;">
                <label for="postDelay">זמן השהייה בין תרחישים (בדקות):</label>
                <input id="postDelay" type="number" min="0" max="65535" value="4" onchange="debouncedUpdateBLEValue('postDelay')" />
                
                <small style="display:block; margin-bottom: 10px; color: gray; text-align: right;">מנמום 10 דקות </small>
                <label for="repeatCount">מספר חזרות:</label>
                <input type="number" id="repeatCount" min="1" max="255" value="1" onchange="debouncedUpdateBLEValue('repeatCount')" />

                <hr style="margin-top: 20px; margin-bottom: 20px; border-top: 1px solid #eee;">

                <div class="device-info-section">
                    <h3>פרטי מכשיר:</h3>
                    <p><strong>שם מכשיר:</strong> <span id="deviceNameDisplay">--</span></p>
                    <!-- Removed MAC address display as per user request -->
                    <!-- Removed Firmware Version display as per user request -->
                    <button onclick="queueBleOperation('readDeviceInfo')">
                        <i class="fas fa-sync-alt"></i> רענן פרטי מכשיר
                    </button>
                    <button onclick="queueBleOperation('checkFirmwareVersion')" id="checkFirmwareButton" style="margin-top: 15px;">
                        <i class="fas fa-cloud-download-alt"></i> בדוק עדכוני קושחה
                    </button>
                    <div id="firmwareUpdateStatus" style="margin-top: 10px; font-weight: bold; text-align: right;"></div>
                </div>
                
                <a href="https://drive.google.com/drive/folders/14_V9v3YIZeiOrKpU_NdRokqzOAurb0Ax?usp=drive_link" target="_blank" style="display: block; margin-top: 15px; text-decoration: none; color: #007bff; text-align: right;">
                    <i class="fab fa-google-drive"></i> גישה לקבצי קושחה ב-Google Drive
                </a>

                <hr style="margin-top: 20px; margin-bottom: 20px; border-top: 1px solid #eee;">

                <div class="ota-section">
                    <h2>עדכון קושחה (OTA)</h2>
                    <input type="file" id="firmwareFile" accept=".bin">
                    <button id="startOtaButton" onclick="queueBleOperation('startOtaUpdate')" disabled>
                        <i class="fas fa-cloud-upload-alt"></i> התחל עדכון קושחה
                    </button>
                    <div class="progress-bar-container" id="otaProgressBarContainer">
                        <div class="progress-bar" id="otaProgressBar">0%</div>
                    </div>
					
                    <div id="otaStatusMessage"></div>
                </div>
            </div> <!-- Correctly closing advancedOptions -->
            
            <h3>רטטים שנותרו: <span id="totalVibrations">0</span></h3>    
        </div> <!-- Correctly closing controlPanel -->
    </div>
</body>
<script>
    let device, server, service, charStart, charStop, charVibratePower, charPulseInterval, charPulseNumber,
        charVibrationDuration, charVibrationStatus;

    // OTA related characteristics
    let otaService, otaControlChar, otaDataChar, otaStatusChar;
    // --- UPDATED UUIDs TO MATCH ESP32 CODE (AND NOW LOWERCASE FOR WEB BLUETOOTH) ---
    const otaServiceUuid = "501a0001-08ee-4dee-ae83-3a19c0e28b02";
    const otaControlCharUuid = "501a0003-08ee-4dee-ae83-3a19c0e28b02";
    const otaDataCharUuid = "501a0002-08ee-4dee-ae83-3a19c0e28b02";
    const otaStatusCharUuid = "501a0004-08ee-4dee-ae83-3a19c0e28b02";

    // --- Main Service and Characteristics UUIDs (also converted to lowercase) ---
    const mainServiceUuid = "069f372b-274b-4198-a099-74f2791734a5";
    const charUuidVibratePower = "84a054be-6a59-402c-9f49-cf3a5a0c230b";
    const charUuidPulseInterval = "53843d2f-2a09-4614-8776-fc8a68fee4b9";
    const charUuidPulseNumber = "8c29fc39-27ae-4e90-a7de-eb3eb4f820bf";
    const charUuidVibrationDuration = "7737e412-351e-4245-9e79-b2a5673a5abf";
    const charUuidStartStop = "66ccf7cf-6a9e-4eda-b868-515dd5b9eb8b";
    const charUuidVibrationStatus = "12cfcb54-2b8a-4da4-a737-f040b6f79fc7";

    // NEW: Device Info Characteristic UUID
    const charUuidDeviceInfo = "a1b2c3d4-e5f6-7890-1234-567890abcdef"; // Custom UUID for MAC and FW version
    let charDeviceInfo;
    let deviceMacAddress = '--'; // Stores the MAC address for Apps Script communication
    let deviceFirmwareVersion = '--'; // Stores the firmware version read from the device

    // NEW: Google Apps Script Web App URL (REPLACE THIS WITH YOUR DEPLOYED URL)
    const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZQRbqZGWt_rI6DOwu3X4zNik3-d8ZObSs7EDYVe98IU6sxz0DhB56YTHg9fgk2fPx/exec";
    // NEW: Google Drive Firmware Folder ID (REPLACE THIS WITH YOUR ACTUAL FOLDER ID)
    const GOOGLE_DRIVE_FOLDER_ID = "https://drive.google.com/drive/folders/14_V9v3YIZeiOrKpU_NdRokqzOAurb0Ax?usp=drive_link";


    const OTA_COMMAND_START = 0x01;
    const OTA_COMMAND_END = 0x02;
    const OTA_COMMAND_ABORT = 0x03; // Note: ESP32 code uses 0x03 for CANCEL OTA
    const MAX_CHUNK_SIZE = 500; // Max bytes per BLE write operation (adjust based on ESP32 MTU)

    let connectionInterval;

    // --- Battery Voltage Constants (Adjust these based on your specific battery) ---
    const BATTERY_MAX_VOLTAGE = 4.2; // Full charge voltage for a 3.7V LiPo
    const BATTERY_MIN_VOLTAGE = 3.0; // Empty voltage (cutoff) for a 3.7V LiPo

    // --- NEW: BLE Operation Queue ---
    const bleOperationQueue = [];
    let isProcessingQueue = false;

    // Function to add an operation to the queue
    function queueBleOperation(operationType, ...args) {
        bleOperationQueue.push({ type: operationType, args: args });
        console.log(`Operation '${operationType}' queued. Queue size: ${bleOperationQueue.length}`);
        processBleQueue(); // Attempt to process the queue
    }

    // Function to process the queue sequentially
    async function processBleQueue() {
        if (isProcessingQueue || bleOperationQueue.length === 0) {
            return;
        }

        isProcessingQueue = true;
        const operation = bleOperationQueue.shift(); // Get the first operation
        console.log(`Processing operation: '${operation.type}'`);

        try {
            switch (operation.type) {
                case 'updateBLEValue':
                    await updateBLEValueInternal(...operation.args);
                    break;
                case 'startScenario':
                    await startScenarioInternal(); // Call internal function
                    break;
                case 'stopScenario':
                    await stopScenarioInternal(); // Call internal function
                    break;
                case 'readDeviceInfo': // NEW: Handle readDeviceInfo operation
                    await readDeviceInfoInternal(); // Renamed to internal
                    break;
                case 'startOtaUpdate':
                    await startOtaUpdateInternal(); // Call internal function
                    break;
                case 'checkFirmwareVersion': // NEW: Handle checkFirmwareVersion operation
                    await checkFirmwareVersionInternal();
                    break;
                // Add other operations as needed
                default:
                    console.warn(`Unknown operation type: ${operation.type}`);
            }
        } catch (error) {
            console.error(`Error processing operation '${operation.type}':`, error);
            document.getElementById('errorMessage').textContent = `שגיאה בפעולת BLE: ${error.message}`;
            document.getElementById('errorMessage').style.display = 'block';
            handleBleDisconnected(); // Disconnect on critical error
        } finally {
            isProcessingQueue = false;
            // Add a small delay before processing the next item to prevent rapid-fire operations
            // and give the BLE stack a moment.
            await new Promise(resolve => setTimeout(resolve, 50)); 
            processBleQueue(); // Process the next operation
        }
    }

    // Debounce function
    function debounce(func, delay) {
        let timeout;
        return function(...args) {
            const context = this;
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(context, args), delay);
        };
    }

    // Debounced version of updateBLEValue
    const debouncedUpdateBLEValue = debounce((field) => {
        queueBleOperation('updateBLEValue', field);
    }, 300); // 300ms debounce delay

    // This function is still useful for general checks, but ondisconnected is more immediate.
    function checkBLEConnection() {
        if (!device || !device.gatt.connected) {
            console.log("BLE disconnected, trying to reconnect (from interval check)...");
            // Call the disconnection handling directly
            handleBleDisconnected();
        }
    }

    // New function to handle BLE disconnection events
    function handleBleDisconnected(event) {
        console.log('BLE device disconnected!', event ? event.target.name : '');
        document.getElementById('statusMessage').textContent = "חיבור נותק. אנא התחבר מחדש.";
        document.getElementById('errorMessage').textContent = "חיבור נותק. אנא לחץ על 'התחבר ל-ESP32 BLE' כדי לבחור ולהתחבר מחדש."; // הודעה מפורטת יותר
        document.getElementById('errorMessage').style.display = 'block';

        // Hide control panel, show connect button
        document.getElementById('controlPanel').style.display = 'none';
        
        document.getElementById('connectButton').style.display = 'block'; // הצג את כפתור ההתחברות מחדש
        document.getElementById('disconnectButton').style.display = 'none';

        // Clear the periodic connection check interval if it's running
        clearInterval(connectionInterval);
        connectionInterval = null; // Reset to null after clearing

        // Reset device and server objects to null to ensure a fresh connection
        device = null;
        server = null;
        service = null;
        charStart = null;
        charStop = null;
        charVibratePower = null;
        charPulseInterval = null;
        charPulseNumber = null;
        charVibrationDuration = null;
        charVibrationStatus = null;
        charDeviceInfo = null; // Reset device info characteristic

        // Reset OTA related characteristics as well
        otaService = null;
        otaControlChar = null;
        otaDataChar = null;
        otaStatusChar = null;

        // Update OTA button state and message on disconnect
        updateOtaButtonState();

        document.getElementById('otaProgressBarContainer').style.display = 'none'; // Hide container
        document.getElementById('otaProgressBar').style.width = '0%';
        document.getElementById('otaProgressBar').textContent = '0%';
        // otaStatusMessage is handled by updateOtaButtonState()

        // Reset battery display on disconnect
        document.getElementById('batteryPercentageDisplay').textContent = '--';
        document.getElementById('batteryIcon').className = 'fas fa-battery-empty';
        document.getElementById('batteryIcon').style.color = '#666';

        // Reset device info displays
        document.getElementById('deviceNameDisplay').textContent = '--'; // NEW
        // document.getElementById('deviceMacDisplay').textContent = '--'; // REMOVED
        document.getElementById('firmwareUpdateStatus').textContent = ''; // NEW - this will now show the check status
        // document.getElementById('deviceFirmwareDisplay').textContent = '--'; // REMOVED
        
        // Clear the queue on disconnect
        bleOperationQueue.length = 0;
        isProcessingQueue = false;
    }

    // פונקציה להתחבר ל-BLE
    async function connectBLE() {
        try {
            // Reset UI state before attempting connection
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('statusMessage').textContent = "מתחבר...";

            device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Golden life - ' }], // Filter by prefix to catch "Golden life - MAC_ADDRESS"
                optionalServices: [
                    mainServiceUuid, // Existing custom service (lowercase)
                    otaServiceUuid // New OTA service UUID (lowercase)
                ]
            });

            // Add the disconnection event listener immediately after getting the device
            device.addEventListener('gattserverdisconnected', handleBleDisconnected);

            server = await device.gatt.connect();
            console.log('Connected to GATT server. Waiting for services...');
            await new Promise(resolve => setTimeout(resolve, 500)); // Add a small delay here for stability

            // Explicitly check if server is null after connection attempt
            if (!server) {
                throw new Error("GATT server connection failed or disconnected immediately.");
            }

            // Populate device name and MAC from device.name immediately
            const deviceName = device.name || 'Unknown Device';
            document.getElementById('deviceNameDisplay').textContent = deviceName;

            let macAddressExtracted = '--';
            // Regex to match MAC with colons (e.g., 54:32:04:3D:A0:CE) or without (e.g., 5432043DA0CE)
            const macMatch = deviceName.match(/([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}|[0-9A-Fa-f]{12}/);

            if (macMatch) {
                const rawMac = macMatch[0].toUpperCase();
                if (rawMac.includes(':')) {
                    macAddressExtracted = rawMac; // Already has colons
                } else {
                    // If contiguous, format it with colons for consistency with Apps Script
                    macAddressExtracted = rawMac.replace(/(.{2})/g, '$1:').slice(0, -1); // Add colons
                }
            }

            deviceMacAddress = macAddressExtracted; // Store for Apps Script
            console.log(`Extracted MAC: ${deviceMacAddress}`);


            // Get main service and characteristics
            service = await server.getPrimaryService(mainServiceUuid);
            console.log('Main service retrieved. Getting characteristics...');
            await new Promise(resolve => setTimeout(resolve, 100)); // Add a small delay here too

            // קבלת מאפיינים (now using lowercase UUID constants)
            charVibratePower = await getCharacteristic(service, charUuidVibratePower, 'Vibrate Power');
            charPulseInterval = await getCharacteristic(service, charUuidPulseInterval, 'Pulse Interval');
            charPulseNumber = await getCharacteristic(service, charUuidPulseNumber, 'Pulse Number');
            charVibrationDuration = await getCharacteristic(service, charUuidVibrationDuration, 'Vibration Duration');
            charStart = await getCharacteristic(service, charUuidStartStop, 'Start/Stop');
            charVibrationStatus = await getCharacteristic(service, charUuidVibrationStatus, 'Vibration Status');
            
            // Get OTA Service and Characteristics (now using lowercase UUID constants)
            otaService = await server.getPrimaryService(otaServiceUuid);
            otaControlChar = await getCharacteristic(otaService, otaControlCharUuid, 'OTA Control');
            otaDataChar = await getCharacteristic(otaService, otaDataCharUuid, 'OTA Data');
            otaStatusChar = await getCharacteristic(otaService, otaStatusCharUuid, 'OTA Status');

            // Get Device Info Characteristic
            charDeviceInfo = await getCharacteristic(service, charUuidDeviceInfo, 'Device Info'); // Still get from main service
            if (charDeviceInfo) {
                // Read device info internally, but don't display current FW version on panel directly
                await readDeviceInfoInternal(); // Renamed to internal
            } else {
                console.warn('Device Info characteristic not found. Device info features will be limited.');
            }

            // עכשיו שים כאן את הטעינה של פרמטרים
            await loadScenarioParams();
            await loadSettingsFromBLE(); // This was missing, good to have it here
            await startNotifications();
            
            // Call checkFirmwareVersion after all device info is potentially loaded
            queueBleOperation('checkFirmwareVersion'); // NEW: Queue firmware check after connection

            // Show control panel and update button visibility
            document.getElementById('controlPanel').style.display = 'block';
            document.getElementById('connectButton').style.display = 'none';
            document.getElementById('disconnectButton').style.display = 'block';
            
            document.getElementById('statusMessage').textContent = "מחובר למכשיר: " + (device.name || 'Unknown Device');
            document.getElementById('errorMessage').style.display = 'none';

            // Start the periodic connection check if it's not already running
            if (!connectionInterval) {
                connectionInterval = setInterval(checkBLEConnection, 30000);
            }

            // Update OTA button state after successful connection
            updateOtaButtonState();

        } catch (error) {
            console.error('BLE connection failed:', error);
            // Check if the error is due to user cancellation (e.g., closing the device picker)
            if (error.name === 'NotFoundError') {
                document.getElementById('errorMessage').textContent = "בחירת המכשיר בוטלה. אנא נסה שוב.";
            } else if (error.message.includes('GATT Server is disconnected') || error.message.includes('GATT server connection failed')) {
                document.getElementById('errorMessage').textContent = `חיבור BLE נכשל: השרת התנתק או החיבור נכשל. ודא שהמכשיר מופעל וקרוב, ונסה שוב.`;
            }
            else {

    function parseStartStopData(dataView) {
        const command = dataView.getUint8(0);
        const delay = dataView.getUint16(1, true); // true = little endian
        const repeat = dataView.getUint8(3);
        const voltageRaw = dataView.getUint16(4, true); // זהו המתח מוכפל ב-100
        const remainingScenarios = dataView.getUint8(6); // בייט חדש (אינדקס 6)

        const voltageV = voltageRaw / 100; // חזרה למתח ב-V

        return { command, delay, repeat, voltageV, remainingScenarios };
    }

    // Function to calculate battery percentage and update icon
    function updateBatteryDisplay(voltageV) {
        const batteryPercentageDisplay = document.getElementById('batteryPercentageDisplay');
        const batteryIcon = document.getElementById('batteryIcon');

        let percentage = 0;
        if (voltageV >= BATTERY_MAX_VOLTAGE) {
            percentage = 100;
        } else if (voltageV <= BATTERY_MIN_VOLTAGE) {
            percentage = 0;
        } else {
            percentage = ((voltageV - BATTERY_MIN_VOLTAGE) / (BATTERY_MAX_VOLTAGE - BATTERY_MIN_VOLTAGE)) * 100;
            percentage = Math.round(percentage); // Round to nearest whole number
        }

        batteryPercentageDisplay.textContent = percentage;

        // Update battery icon based on percentage
        if (percentage > 90) {
            batteryIcon.className = 'fas fa-battery-full';
            batteryIcon.style.color = '#28a745'; // Green
        } else if (percentage > 60) {
            batteryIcon.className = 'fas fa-battery-three-quarters';
            batteryIcon.style.color = '#4CAF50'; // Darker Green
        } else if (percentage > 30) {
            batteryIcon.className = 'fas fa-battery-half';
            batteryIcon.style.color = '#ffc107'; // Yellow
        } else if (percentage > 10) {
            batteryIcon.className = 'fas fa-battery-quarter';
            batteryIcon.style.color = '#fd7e14'; // Orange
        } else {
            batteryIcon.className = 'fas fa-battery-empty';
            batteryIcon.style.color = '#dc3545'; // Red
        }
    }

    // Renamed to internal as it's now called by the queue
    async function startScenarioInternal() {
        try {
            if (!device || !device.gatt.connected) {
                console.warn('Cannot start scenario: Device not connected. Please connect first.');
                return;
            }

            // Change button text and color to indicate "starting"
            const startButton = document.getElementById('startButton');
            startButton.textContent = "מפעיל...";
            startButton.style.backgroundColor = "#ffc107"; // Yellow/Orange

            // Get current values from input fields
            const delay = parseInt(document.getElementById('postDelay').value, 10);
            const repeat = parseInt(document.getElementById('repeatCount').value, 10);

            // Ensure values are within valid ranges (matching ESP32 firmware constraints)
            const validatedDelay = Math.max(delay, 4); // Minimum 4 minutes from ESP32 code
            const validatedRepeat = Math.max(repeat, 1); // Minimum 1 repetition

            // Prepare the data buffer (7 bytes: command, delay LSB, delay MSB, repeat, voltage LSB, voltage MSB, remaining scenarios)
            const buffer = new ArrayBuffer(7);
            const view = new DataView(buffer);

            view.setUint8(0, 1); // Command: 1 (Start Scenario)
            view.setUint16(1, validatedDelay, true); // Delay (little-endian)
            view.setUint8(3, validatedRepeat); // Repeat Count
            view.setUint16(4, 0, true); // Placeholder for voltage (will be updated by ESP32)
            view.setUint8(6, 0); // Placeholder for remaining scenarios (will be updated by ESP32)

            if (charStart) { // Check if charStart is available
                await charStart.writeValue(buffer);
                console.log(`Scenario started with Delay: ${validatedDelay} min, Repeat: ${validatedRepeat}`);
                document.getElementById('statusMessage').textContent = "תרחיש הופעל. ממתין לסטטוס...";
                document.getElementById('errorMessage').style.display = 'none';

                // Request current status immediately after starting to get the remaining scenarios
                await new Promise(resolve => setTimeout(resolve, 200)); // Small delay
                await charStart.writeValue(new Uint8Array([2, 0, 0, 0, 0, 0, 0])); // Command 2 to request status
                console.log("Requested status update after starting scenario.");
            } else {
                console.error("charStart characteristic not available. Cannot start scenario.");
                document.getElementById('errorMessage').textContent = "שגיאה: מאפיין התחלה/עצירה אינו זמין.";
                document.getElementById('errorMessage').style.display = 'block';
            }

            // Reset button text and color after sending command
            startButton.textContent = "התחל תרחיש";
            startButton.style.backgroundColor = "#007bff"; // Blue

        } catch (error) {
            console.error('Failed to start scenario:', error);
            document.getElementById('errorMessage').textContent = `שגיאה בהפעלת תרחיש: ${error.message}`;
            document.getElementById('errorMessage').style.display = 'block';
            throw error; // Re-throw to be caught by processBleQueue
        }
    }

    // NEW: Function to read Device Info internally (no UI update for firmware version)
    async function readDeviceInfoInternal() {
        try {
            if (!device || !device.gatt.connected || !charDeviceInfo) {
                console.warn('Cannot read device info internally: Device not connected or characteristic not available.');
                deviceFirmwareVersion = '--'; // Ensure it's reset if not found
                return;
            }

            const value = await charDeviceInfo.readValue();
            const decoder = new TextDecoder('utf-8');
            const deviceInfoString = decoder.decode(value.buffer);
            console.log("Received Device Info (internal):", deviceInfoString);

            // Parse MAC and Firmware Version from the string (e.g., "MAC:XX:XX:XX:XX:XX:XX,FW:X.Y.Z")
            let macAddressExtracted = '--';
            const macWithColonsMatch = deviceInfoString.match(/MAC:([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}/);
            const macContiguousMatch = deviceInfoString.match(/MAC:([0-9A-Fa-f]{12})/); // Matches 12 hex chars after "MAC:"

            if (macWithColonsMatch) {
                macAddressExtracted = macWithColonsMatch[1].toUpperCase(); // Capture group 1
            } else if (macContiguousMatch) {
                const contiguousMac = macContiguousMatch[1].toUpperCase();
                macAddressExtracted = contiguousMac.replace(/(.{2})/g, '$1:').slice(0, -1); // Add colons
            }
            deviceMacAddress = macAddressExtracted; // Update global variable

            const fwMatch = deviceInfoString.match(/FW:([\w.-]+)/);

            // Update global variables
            deviceFirmwareVersion = fwMatch ? fwMatch[1] : '--';

            // Update device name display (already done in connectBLE, but can be refreshed here if needed)
            // document.getElementById('deviceNameDisplay').textContent = device.name || 'Unknown Device';
            
            // No direct UI update for deviceFirmwareVersion here, it's used for the Apps Script call.

        } catch (error) {
            console.error('Failed to read Device Info characteristic internally:', error);
            deviceFirmwareVersion = '--'; // Ensure it's reset on error
            throw error;
        }
    }

    // NEW: Firmware Check with Google Apps Script (displays latest version from Sheets)
    async function checkFirmwareVersionInternal() { // Renamed to internal
        const firmwareUpdateStatus = document.getElementById('firmwareUpdateStatus');
        const checkFirmwareButton = document.getElementById('checkFirmwareButton');
        
        firmwareUpdateStatus.textContent = 'בודק עדכוני קושחה...';
        firmwareUpdateStatus.style.color = 'blue';
        checkFirmwareButton.disabled = true;

        if (!device || !device.gatt.connected) {
            firmwareUpdateStatus.textContent = 'שגיאה: המכשיר אינו מחובר. אנא התחבר תחילה.';
            firmwareUpdateStatus.style.color = 'red';
            checkFirmwareButton.disabled = false;
            return;
        }

        // Ensure MAC address is available (from device.name or charDeviceInfo)
        // deviceMacAddress is populated in connectBLE and readDeviceInfoInternal
        if (deviceMacAddress === '--') {
            firmwareUpdateStatus.textContent = 'שגיאה: המכשיר מחובר, אך לא ניתן לאתר כתובת MAC משמו.';
            firmwareUpdateStatus.style.color = 'red';
            checkFirmwareButton.disabled = false;
            return;
        }

        // Ensure firmware version is available from the device (read internally)
        // This call ensures deviceFirmwareVersion is populated from charDeviceInfo
        await readDeviceInfoInternal();
        if (deviceFirmwareVersion === '--') {
            firmwareUpdateStatus.textContent = 'שגיאה: המכשיר מחובר, אך לא ניתן לקרוא את גרסת הקושחה מהמאפיין.';
            firmwareUpdateStatus.style.color = 'red';
            checkFirmwareButton.disabled = false;
            return;
        }

        try {
            const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    mac: deviceMacAddress,
                    firmware: deviceFirmwareVersion // Send device's current firmware for comparison
                })
            });

            const result = await response.json();

            if (result.status === 'success') {
                if (result.updateRequired) {
                    firmwareUpdateStatus.textContent = `עדכון זמין! גרסה חדשה: ${result.latestFirmware}. אתה בגרסה: ${deviceFirmwareVersion}`;
                    firmwareUpdateStatus.style.color = 'blue'; // Changed to blue
                } else {
                    firmwareUpdateStatus.textContent = `אתה משתמש בגרסה העדכנית ביותר (${deviceFirmwareVersion}).`;
                    firmwareUpdateStatus.style.color = 'green';
                }
            } else {
                firmwareUpdateStatus.textContent = `שגיאה בבדיקת קושחה: ${result.message}`;
                firmwareUpdateStatus.style.color = 'red';
            }
        } catch (error) {
            console.error('Error checking firmware:', error);
            firmwareUpdateStatus.textContent = `שגיאה בבדיקת קושחה (תקלת רשת/שרת): ${error.message}`;
            firmwareUpdateStatus.style.color = 'red';
            throw error; // Re-throw to be caught by processBleQueue
        } finally {
            checkFirmwareButton.disabled = false;
        }
    }

    // Helper function to update the OTA button's disabled state and message
    function updateOtaButtonState() {
        const startOtaButton = document.getElementById('startOtaButton');
        const otaStatusMessage = document.getElementById('otaStatusMessage');
        const firmwareFile = document.getElementById('firmwareFile');

        const isConnected = device && device.gatt && device.gatt.connected;

        if (isConnected && isFileSelected) {
            startOtaButton.disabled = false;

            otaStatusMessage.style.color = 'green';

            startOtaButton.disabled = true;
            if (!isConnected && !isFileSelected) {
                otaStatusMessage.textContent = 'אנא התחבר למכשיר ובחר קובץ קושחה (.bin) כדי להתחיל עדכון.';
                otaStatusMessage.style.color = 'gray';
            } else if (!isConnected) {
                otaStatusMessage.textContent = 'המכשיר אינו מחובר. אנא התחבר כדי להמשיך בעדכון הקושחה.';
                otaStatusMessage.style.color = 'orange';
            } else if (!isFileSelected) {
                otaStatusMessage.textContent = 'אנא בחר קובץ קושחה (.bin) כדי להתחיל עדכון.';
                otaStatusMessage.style.color = 'orange';
            }
        }
    }


    // Renamed to startOtaUpdateInternal as it's now called by the queue
    async function startOtaUpdateInternal() {
        const firmwareFile = document.getElementById('firmwareFile').files[0];
        const otaProgressBar = document.getElementById('otaProgressBar');
        const otaProgressBarContainer = document.getElementById('otaProgressBarContainer'); // Get the element
        const otaStatusMessage = document.getElementById('otaStatusMessage');
        const startOtaButton = document.getElementById('startOtaButton');

        if (!firmwareFile) {
            otaStatusMessage.textContent = 'אנא בחר קובץ קושחה (.bin) תחילה.';
            otaStatusMessage.style.color = 'red';
            throw new Error('No firmware file selected.');
        }

        if (!device || !device.gatt.connected || !otaControlChar || !otaDataChar || !otaStatusChar) {
            otaStatusMessage.textContent = 'המכשיר אינו מחובר או ששירותי OTA אינם זמינים.';
            otaStatusMessage.style.color = 'red';
            handleBleDisconnected(); // Trigger UI reset and prompt for reconnect
            throw new Error('BLE device not connected or OTA services unavailable.');
        }

        startOtaButton.disabled = true;
        otaProgressBarContainer.style.display = 'block'; // Now this should work
        otaProgressBar.style.width = '0%';
        otaProgressBar.textContent = '0%';
        otaStatusMessage.textContent = 'מתחיל עדכון קושחה...';
        otaStatusMessage.style.color = 'blue';

        try {
            // Read firmware file as ArrayBuffer (firmwareFileBuffer should already be set by the change listener)
            const firmwareData = new Uint8Array(firmwareFileBuffer);
            const firmwareSize = firmwareData.length;
            console.log(`Firmware size: ${firmwareSize} bytes`);

            // 1. Send START_OTA command (with firmware size)
            const startCommand = new ArrayBuffer(5); // Command (1 byte) + Size (4 bytes)
            const startView = new DataView(startCommand);
            startView.setUint8(0, OTA_COMMAND_START);
            startView.setUint32(1, firmwareSize, true); // Little-endian for size
            await otaControlChar.writeValue(startCommand);
            console.log('Sent START_OTA command with size:', firmwareSize);
            otaStatusMessage.textContent = 'נשלחה פקודת התחלה. מתחיל העברת נתונים...';

            // Give ESP32 a moment to prepare
            await new Promise(resolve => setTimeout(resolve, 500)); 

            // 2. Send firmware data in chunks
            let bytesSent = 0;
            // Removed totalChunks calculation as it's not strictly necessary for loop control
            console.log(`Starting data transfer...`);

            for (let i = 0; i < firmwareSize; i += MAX_CHUNK_SIZE) {
                const chunk = firmwareData.slice(i, i + MAX_CHUNK_SIZE);
                await sendChunk(chunk);
                bytesSent += chunk.length;

                const progress = Math.min(100, Math.floor((bytesSent / firmwareSize) * 100));
                otaProgressBar.style.width = `${progress}%`;
                otaProgressBar.textContent = `${progress}%`;
                otaStatusMessage.textContent = `מעלה קושחה: ${bytesSent}/${firmwareSize} בתים (${progress}%)`;
                
                // Add a small delay between chunks to prevent overwhelming the BLE buffer
                await new Promise(resolve => setTimeout(resolve, 10)); 
            }
            console.log('All firmware data chunks sent.');
            otaStatusMessage.textContent = 'כל הנתונים נשלחו. ממתין לאישור סיום...';

            // 3. Send END_OTA command
            const endCommand = new ArrayBuffer(1);
            new DataView(endCommand).setUint8(0, OTA_COMMAND_END);
            await otaControlChar.writeValue(endCommand);
            console.log('Sent END_OTA command.');
            otaStatusMessage.textContent = 'פקודת סיום נשלחה. המכשיר מתעדכן...';
            otaStatusMessage.style.color = 'orange';

        } catch (error) {
            console.error('OTA update failed:', error);
            otaStatusMessage.textContent = `עדכון OTA נכשל: ${error.message}`;
            otaStatusMessage.style.color = 'red';
            // Send ABORT_OTA command in case of failure
            if (otaControlChar) {
                try {
                    const abortCommand = new ArrayBuffer(1);
                    new DataView(abortCommand).setUint8(0, OTA_COMMAND_ABORT);
                    await otaControlChar.writeValue(abortCommand);
                    console.log('Sent ABORT_OTA command due to error.');
                } catch (abortError) {
                        console.error('Failed to send ABORT_OTA command:', abortError);
                }
            }
            throw error; // Re-throw to be caught by processBleQueue
        } finally {
            updateOtaButtonState(); // Re-enable button or update state after attempt
        }
    }

    async function sendChunk(chunk) {
        if (!otaDataChar) {
            throw new Error('OTA Data Characteristic not available.');
        }
        await otaDataChar.writeValueWithoutResponse(chunk); // Use writeValueWithoutResponse for speed
    }

    function handleOtaStatusUpdate(event) {
        const value = event.target.value; // DataView
        // Check if value is long enough (at least 1 byte for status, 5 bytes for status+progress)
        if (value.byteLength < 1) {
            console.warn("Received empty OTA status update.");
            return;
        }

        const statusCode = value.getUint8(0);
        let progress = 0;
        if (value.byteLength >= 5) { // If progress data is present
            progress = value.getUint32(1, true); // Progress is 4 bytes, little-endian
        }
        
        let statusMessageText = '';
        let messageColor = 'blue';
        let isFinalState = false; // Flag to indicate if OTA process finished (success/fail)

        // OTA Status Definitions (matching Arduino enum)
        const OtaStatus = {
            OTA_IDLE: 0,
            OTA_STARTING: 1,
            OTA_IN_PROGRESS: 2,
            OTA_VERIFYING: 3,
            // OTA_IN_PROGRESS: 3, // Removed duplicate
            OTA_COMPLETE: 4,
            OTA_FAILED: 5
        };

        switch (statusCode) {
            case OtaStatus.OTA_IDLE: statusMessageText = 'OTA: מוכן'; messageColor = 'gray'; break;
            case OtaStatus.OTA_STARTING: statusMessageText = 'OTA: מתחיל...'; messageColor = 'blue'; break;
            case OtaStatus.OTA_IN_PROGRESS: 
                // Progress is often sent by device, but if not, we can use local progress
                const firmwareFileSize = document.getElementById('firmwareFile').files[0] ? document.getElementById('firmwareFile').files[0].size : 1;
                // Use the 'progress' value sent by the device if available and valid
                let displayProgress = progress; 
                if (firmwareFileSize > 0) { // Calculate percentage if file size is known
                    displayProgress = Math.min(100, Math.floor((progress / firmwareFileSize) * 100));
                }
                document.getElementById('otaProgressBar').style.width = `${displayProgress}%`;
                document.getElementById('otaProgressBar').textContent = `${displayProgress}%`;
                statusMessageText = `OTA: מעלה קושחה: ${displayProgress}%`; // Simplified message
                messageColor = 'blue';
                break;
            case OtaStatus.OTA_VERIFYING: statusMessageText = 'OTA: מאמת וצורב קושחה...'; messageColor = 'orange'; break;
            case OtaStatus.OTA_COMPLETE: 
                statusMessageText = 'OTA: הסתיים בהצלחה! המכשיר יופעל מחדש.'; messageColor = 'green';
                document.getElementById('otaProgressBar').style.width = '100%';
                document.getElementById('otaProgressBar').textContent = '100%';
                isFinalState = true;
                break;
            case OtaStatus.OTA_FAILED: 
                statusMessageText = 'OTA: נכשל! אנא נסה שוב.'; messageColor = 'red';
                document.getElementById('otaProgressBar').style.width = '0%';
                document.getElementById('otaProgressBar').textContent = 'נכשל';
                isFinalState = true;
                break;
            default: statusMessageText = `OTA: סטטוס לא ידוע (0x${statusCode.toString(16)})`; messageColor = 'gray'; break;
        }

        console.log(`OTA Status Update: ${statusMessageText} (Code: 0x${statusCode.toString(16)}, Raw Progress: ${progress})`);
        document.getElementById('otaStatusMessage').textContent = statusMessageText;
        document.getElementById('otaStatusMessage').style.color = messageColor;

        if (isFinalState) {
            updateOtaButtonState(); // Re-enable button or update state
            if (statusCode === OtaStatus.OTA_COMPLETE) {
                // If successful, prompt for reconnect after a short delay for user to read message
                setTimeout(() => {
                    document.getElementById('otaStatusMessage').textContent = 'העדכון הסתיים בהצלחה. המכשיר יופעל מחדש. אנא התחבר מחדש.';
                    handleBleDisconnected(); // Trigger UI reset and prompt for reconnect
                }, 2000); 
            } else {
                 handleBleDisconnected(); // For errors, also reset UI
            }
        }
    }
</script>
